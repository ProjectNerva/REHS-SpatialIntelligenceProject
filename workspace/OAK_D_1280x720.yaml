%YAML:1.0

File.version: "1.0"

# Confirmed via the calibration dump: distortion model -> Perspective for both CAM_B and
# CAM_C, so PinHole is correct.
Camera.type: "PinHole"

#--------------------------------------------------------------------------------------------
# Camera1 = left mono camera (CAM_B / OV9282)
#--------------------------------------------------------------------------------------------
Camera1.fx: 571.665100
Camera1.fy: 571.665100
Camera1.cx: 651.541321
Camera1.cy: 349.827820
Camera1.k1: 0.531890
Camera1.k2: -0.172360
Camera1.p1: 0.000178
Camera1.p2: -0.000454
Camera1.k3: -0.013387

#--------------------------------------------------------------------------------------------
# Camera2 = right mono camera (CAM_C / OV9282)
#--------------------------------------------------------------------------------------------
Camera2.fx: 577.342651
Camera2.fy: 577.342651
Camera2.cx: 665.776489
Camera2.cy: 344.304565
Camera2.k1: 1.365720
Camera2.k2: 0.136647
Camera2.p1: -0.000167
Camera2.p2: -0.000413
Camera2.k3: -0.007582

Camera.width: 1280    # matches oakd_recorder.cpp kWidth/kHeight -- native recorded resolution
Camera.height: 720
Camera.fps: 30

Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# Stereo.T_c1_c2: transform from Camera1 (CAM_B) to Camera2 (CAM_C). Resolution-independent --
# identical to the proven value in OAK_D.yaml. getCameraExtrinsics(src, dst) returns the
# transform with src as origin per DepthAI's own docstring, so (CAM_B, CAM_C) is left->right
# directly. useSpecTranslation=False (this unit's actual per-device calibration) DIFFERS from
# useSpecTranslation=True, confirming this rig was individually calibrated. Raw dump:
# Extrinsics/oak_d_eeprom_1280x720.txt.
#--------------------------------------------------------------------------------------------
Stereo.T_c1_c2: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [0.999811, -0.006206, -0.018424, -0.074967,
          0.006169, 0.999979, -0.002070, -0.000177,
          0.018436, 0.001956, 0.999828, -0.000411,
          0.000000, 0.000000, 0.000000, 1.000000]

Stereo.ThDepth: 40.0   # <-- CALIBRATE / tune: generic ORB-SLAM3 example default, not a measured value for this rig

#--------------------------------------------------------------------------------------------
# IMU.T_b_c1: transform from Camera1 (CAM_B) to body/IMU frame. Resolution-independent --
# identical to the proven value in OAK_D.yaml. getCameraToImuExtrinsics(CAM_B) is documented by
# DepthAI as "rotation/translation from the camera to IMU" -- exactly this key's convention.
# useSpecTranslation=False (used here) DIFFERS from useSpecTranslation=True, confirming this
# unit's IMU mount offset was individually measured. Raw dump: Extrinsics/oak_d_eeprom_1280x720.txt.
#--------------------------------------------------------------------------------------------
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [0.999945, -0.009564, 0.004336, 0.000836,
          -0.009582, -0.999945, 0.004278, -0.000709,
          0.004295, -0.004319, -0.999981, -0.000055,
          0.000000, 0.000000, 0.000000, 1.000000]

# Insert keyframes even while tracking is lost -- stock ORB-SLAM3 stereo-inertial example
# default, keeps IMU preintegration continuous across brief tracking gaps rather than
# breaking the chain. Not a measured value, just the standard convention.
IMU.InsertKFsWhenLost: 1

# Noise parameters, averaged across x/y/z from the factory Allan-variance calibration in the
# dump (ORB-SLAM3's IMU noise model is scalar, not per-axis, so per-axis values from the dump
# are averaged here rather than picking one axis arbitrarily). Resolution-independent.
IMU.NoiseGyro: 0.480640
IMU.NoiseAcc: 0.076217
IMU.GyroWalk: 0.069441
IMU.AccWalk: 0.000061
IMU.Frequency: 300.0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 2000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 6
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
