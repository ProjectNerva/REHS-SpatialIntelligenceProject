%YAML:1.0

#--------------------------------------------------------------------------------------------
# RGB-D settings for the OAK-D Pro W (Wide), used by OAKD.cpp / SIMUSLAM
# (ORB_SLAM3::System::RGBD).
#
# Camera1 below is the COLOR camera (CAM_A, sensor OV9782), NOT the left mono
# camera. OAKD.cpp feeds TrackRGBD() the color->requestOutput(960, 540) frame
# plus depth aligned onto it (stereo->setDepthAlign(CAM_A)) -- reusing
# CAM_B/CAM_C mono intrinsics from OAK_D.yaml here would silently misproject
# every point.
#
# Real per-unit values pulled via EEPROM.py's CAM_A block:
#   calibData.getCameraIntrinsics(dai.CameraBoardSocket.CAM_A, 960, 540)
#--------------------------------------------------------------------------------------------
File.version: "1.0"

# Confirmed via EEPROM.py: calibData.getDistortionModel(CAM_A) -> Perspective,
# same as CAM_B/CAM_C, so PinHole is correct here too.
Camera.type: "PinHole"

#--------------------------------------------------------------------------------------------
# Camera1 = color camera (CAM_A / OV9782), at the 960x540 requested in
# OAKD.cpp (color->requestOutput(std::make_pair(960, 540))).
#--------------------------------------------------------------------------------------------
Camera1.fx: 433.321
Camera1.fy: 433.321
Camera1.cx: 469.710
Camera1.cy: 260.070
Camera1.k1: 1.976026
Camera1.k2: 0.191318
Camera1.p1: -0.000273
Camera1.p2: -0.000041
Camera1.k3: -0.019012

# Matches the resolution OAKD.cpp actually requests for the color stream.
Camera.width: 960
Camera.height: 540
Camera.fps: 30   # <-- CALIBRATE: OAKD.cpp never calls setFps() on the color Camera node -- confirm this matches depthai v3's actual default before trusting it, same gap OAK_D.yaml flagged for the mono pair

# Color order (0: BGR, 1: RGB). depthai's ImgFrame::getCvFrame() for a color
# frame conventionally returns BGR (OpenCV's native order) -- 0 is the likely
# correct value here, unlike OAK_D.yaml's Camera.RGB:1 which was for
# grayscale mono frames where this flag is a no-op either way.
# <-- CALIBRATE: verify against the actual colorFrame channel order, don't
# assume.
Camera.RGB: 0

# RGBD.DepthMapFactor: REQUIRED (this is the key whose absence caused
# "RGBD.DepthMapFactor required parameter does not exist, aborting...").
# 1.0 because OAKD.cpp already converts raw uint16-mm depth to float meters
# before TrackRGBD (depthFrame.convertTo(depthMeters, CV_32FC1, 0.001) at
# OAKD.cpp:106) -- any other value here double-scales depth.
RGBD.DepthMapFactor: 1.0

# DepthMapFactor is the only key actually prefixed "RGBD." (confirmed via
# `grep -n 'RGBD\.' /ORB_SLAM3/src/Settings.cc`), but that grep pattern
# doesn't catch keys shared across sensor types. Stereo.ThDepth below turned
# up as a second required key at runtime ("Stereo.ThDepth required parameter
# does not exist, aborting...") -- stock ORB-SLAM3 gates this close/far
# stereo-point threshold on sensor==STEREO||RGBD||IMU_STEREO, not on key
# prefix, so a plain grep for "RGBD." misses it. Treat this list as
# runtime-discovered, not exhaustively verified from source.
Stereo.ThDepth: 40.0   # <-- CALIBRATE / tune: generic ORB-SLAM3 example default, not a measured value for this rig

# Stereo.b: also turned up as required at runtime ("Stereo.b required
# parameter does not exist, aborting..."), same as OAK_D.yaml's finding that
# this fork's Settings.cc reads b_ unconditionally (required=true) rather
# than gating it on sensor==STEREO. Not an arbitrary placeholder: this is the
# real physical baseline of the CAM_B<->CAM_C stereo pair that generates the
# depth map TrackRGBD receives (aligned onto CAM_A afterward), pulled via
# EEPROM.py's stereo extrinsics block -- same value as OAK_D.yaml's Stereo.b.
Stereo.b: 0.074967

# ORB Parameters (generic, not sensor-specific -- reused from OAK_D.yaml)
# nFeatures raised 1000 -> 2000 for a denser sparse map (more ORB keypoints
# extracted per frame -> more candidate map points). Tradeoff: more compute
# per frame (slower tracking) and more low-quality/false matches on
# low-texture surfaces. Tune back down if tracking gets choppy.
ORBextractor.nFeatures: 2000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

# Viewer Parameters (generic, not sensor-specific -- reused from OAK_D.yaml)
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
